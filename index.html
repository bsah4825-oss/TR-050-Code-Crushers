<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderCare MediTrack - AI-Powered Adherence Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div style="position: fixed; top: 10px; right: 10px; z-index: 1000;">
        <button id="soundToggle" onclick="toggleSound()" style="padding: 10px 14px; background: #10b981; color: white; border: none; border-radius: 22px; cursor: pointer; box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);">
            ?? Sound ON
        </button>
    </div>

    <audio id="skipSound" preload="auto" style="display: none;">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSgB6/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSgB6/LMeSwFJMYH8N2QQAoUXrTp66hVFApGn+DyvmwhBSgB6/LMeSwFJMYH8N2QQAoUXrTp66hVFApGn+DyvmwhBSgB6/LMeSw==" type="audio/wav">
    </audio>
    <audio id="successSound" preload="auto" style="display: none;">
        <source src="data:audio/wav;base64,UklGRl9vAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAEA" type="audio/wav">
    </audio>
    <audio id="overdueSound" preload="auto" loop style="display: none;">
        <source src="data:audio/wav;base64,UklGRp4CAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAZGF0YQgAAAAEA" type="audio/wav">
    </audio>

    <div class="app-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-pills"></i> ElderCare MediTrack
            </div>
            <button class="mode-toggle" onclick="toggleView()">
                <i class="fas" id="viewIcon">?? Patient View</i>
            </button>
        </div>

        <div class="sms-settings-panel" id="smsSettings" style="display: none;">
            <h2 class="panel-title">
                <i class="fas fa-sms"></i> SMS Alerts Configuration
            </h2>
            <div class="sms-config">
                <div class="config-row">
                    <label>Caregiver Phone:</label>
                    <input type="tel" id="caregiverPhone" placeholder="+1 (555) 123-4567" value="+15551234567">
                </div>
                <div class="config-row">
                    <label>Patient Phone:</label>
                    <input type="tel" id="patientPhone" placeholder="+1 (555) 987-6543" value="+15559876543">
                </div>
                <div class="config-row">
                    <label>Alert Threshold (hours late):</label>
                    <input type="number" id="alertThreshold" value="2" min="1" max="24">
                </div>
                <div class="config-row">
                    <button class="btn btn-success" onclick="testSMS()">
                        <i class="fas fa-paper-plane"></i> Test SMS
                    </button>
                    <button class="btn btn-primary" onclick="saveSMSConfig()">
                        <i class="fas fa-save"></i> Save Config
                    </button>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="medications-panel">
                <h2 class="panel-title">
                    <i class="fas fa-list"></i> Today's Medications
                </h2>
                <div class="medication-list" id="medList">
                    <!-- Dynamic medications -->
                </div>
            </div>

            <div class="stats-panel">
                <h2 class="panel-title">
                    <i class="fas fa-chart-line"></i> Adherence Analytics
                </h2>
                <div class="metric-card">
                    <div class="metric-value" id="overallAdherence">94%</div>
                    <div class="metric-label">Overall Adherence</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="overallProgress"></div>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="totalDoses">12</div>
                        <div class="metric-label">Total Doses</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="takenDoses">11</div>
                        <div class="metric-label">Taken</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="missedDoses">1</div>
                        <div class="metric-label">Missed</div>
                    </div>
                    <div class="metric-card sms-metric">
                        <div class="metric-value" id="smsSent">0</div>
                        <div class="metric-label">SMS Sent Today</div>
                    </div>
                </div>
                <button class="report-btn" onclick="generateReport()">
                    <i class="fas fa-download"></i> Download Physician Report
                </button>
            </div>
        </div>

        <div id="alertsContainer"></div>
    </div>

    <script src="config/twilio-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
